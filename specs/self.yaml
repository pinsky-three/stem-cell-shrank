version: 1

config:
  visibility: "pub"
  backend: "postgres"

entities:
  - name: "User"
    table: "users"
    id:
      name: "id"
      type: "uuid"
    fields:
      - name: "name"
        type: "string"
        required: true
      - name: "email"
        type: "string"
        required: true
        unique: true

  - name: "Post"
    table: "posts"
    id:
      name: "id"
      type: "uuid"
    fields:
      - name: "title"
        type: "string"
        required: true
      - name: "content"
        type: "string"
        required: true
      - name: "user_id"
        type: "uuid"
        required: true
        references:
          entity: "User"
          field: "id"

  - name: "Comment"
    table: "comments"
    id:
      name: "id"
      type: "uuid"
    fields:
      - name: "content"
        type: "string"
        required: true
      - name: "post_id"
        type: "uuid"
        required: true
        references:
          entity: "Post"
          field: "id"
      - name: "author_id"
        type: "uuid"
        required: true
        references:
          entity: "User"
          field: "id"

relations:
  - name: "owned_posts"
    kind: "has_many"
    source: "User"
    target: "Post"
    foreign_key: "user_id"

  - name: "comments"
    kind: "has_many"
    source: "Post"
    target: "Comment"
    foreign_key: "post_id"

  - name: "author"
    kind: "belongs_to"
    source: "Comment"
    target: "User"
    foreign_key: "author_id"

  - name: "post"
    kind: "belongs_to"
    source: "Comment"
    target: "Post"
    foreign_key: "post_id"
